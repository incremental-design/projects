name: Tag Main

# Tag Main Pipeline Flow:
#
# ┌─────────────────────────────────────────┐
# │  Push to main branch                    │
# └────────────────┬────────────────────────┘
#                  │
#                  ▼
# ┌─────────────────────────────────────────┐
# │  1. Check out repository                │
# │  2. Generate GitHub App token           │
# └────────────────┬────────────────────────┘
#                  │
#                  ▼
# ┌─────────────────────────────────────────┐
# │  Run project-lint-semver on commits     │
# │  (from merge base to HEAD)              │
# └────────────────┬────────────────────────┘
#                  │
#                  ▼
# ┌─────────────────────────────────────────┐
# │  Parse semver output and deduplicate    │
# │  consecutive versions per package       │
# └────────────────┬────────────────────────┘
#                  │
#                  ▼
# ┌─────────────────────────────────────────┐
# │  For each package version change:       │
# │  Dispatch tagCommit workflow with       │
# │  tag name and commit SHA                │
# └─────────────────────────────────────────┘

on:
  push:
    branches: [simplify-dev-config]

jobs:
  tag-main:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.collect-tags.outputs.tags }}
    steps:
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch --all

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Collect and push tags
        id: collect-tags
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e

          mangle_path() {
            local path="$1"

            # Git-tag discoverable ecosystems (auto-index from Git tags)

            # Nix: FlakeHub auto-discovers from Git tags matching semver
            if [[ "$path" =~ \#packages ]]; then
              echo "$(dirname "$path")/${path#*\#packages.}/v"
            # Go: pkg.go.dev auto-discovers from Git tags with format path/package/vX.Y.Z
            elif [[ "$path" =~ go\.mod ]]; then
              echo "$(dirname "$path")/v"
            #
            # Explicit CI/CD publish ecosystems (require manual publish)
            # the tag format doesn't matter for these package managers, but we keep
            # the format consistent for ease of readability
            #
            # Python: PyPI requires explicit upload via CI/CD
            elif [[ "$path" =~ pyproject\.toml ]]; then
              echo "$(dirname "$path")/v"
            # Node.js/Deno: JSR requires explicit publish via deno publish
            elif [[ "$path" =~ package\.json ]] || [[ "$path" =~ deno\.json ]]; then
              echo "$(dirname "$path")/v"
            # Rust: crates.io requires explicit publish via cargo publish
            elif [[ "$path" =~ Cargo\.toml ]]; then
              echo "$(dirname "$path")/v"
            else
              dirname "$path"
            fi
          }

          MERGE_BASE=${{ github.event.before }}
          HEAD="$(git rev-parse HEAD)"

          if [[ "$MERGE_BASE" == "$HEAD" ]]; then
            echo "ℹ️ No commits to process"
            exit 0
          fi

          if ! nix develop --command project-lint-semver $MERGE_BASE $HEAD | tee /tmp/semver_output.jsonl; then
            echo "❌ project-lint-semver failed" >&2
            exit 1
          fi

          # we write to tmp and read back in so that we can catch error in project-lint-semver command

          jq -Rs 'split("\n") | map(select(length > 0) | fromjson) | reduce .[] as $item ({};
            .[$item.path] //= [] |
            if (.[$item.path] | length) == 0 then
              .[$item.path] += [{hash: $item.hash, version: $item.version}]
            elif .[$item.path][-1].version != $item.version then
              .[$item.path] += [{hash: $item.hash, version: $item.version}]
            else
              .
            end
          ) | [to_entries[] | .key as $path | .value[] | select(.version | length > 0) | {path: $path, hash: .hash, version: .version}]' /tmp/semver_output.jsonl > /tmp/package_versions.json

          cat /tmp/package_versions.json

          if [ ! -s /tmp/package_versions.json ]; then
            echo "no tags to create" >&2
            exit 0
          fi

          # dispatch tagCommit workflow once per tag

          jq -r '.[] | "\(.path) \(.version) \(.hash)"' /tmp/package_versions.json | while read path version hash; do
            mangled="$(mangle_path "$path")"
            tag="${mangled}${version}"
            echo "Dispatching tagCommit: tag=$tag sha=$hash"
            gh workflow run tagCommit.yml \
              -f "tag=$tag" \
              -f "sha=$hash"
          done
