name: Tag Commit

# Tag Commit Pipeline Flow:
#
#  ______                _______________
# | Tag  |              |               |
# | Main +---dispatches--> Tag Commit   |
# |______|              |               |
#                       |  1. Generate  |
#                       |     App token |
#                       |  2. Create    |
#                       |     temp ref  |
#                       |  3. Create    |
#                       |     tag       |
#                       |  4. Clean up  |
#                       |     temp ref  |
#                       |_______________|
#
# Why the temporary branch workaround?
#
# GitHub's API has a restriction: it will only allow creating
# tags on commits that have a direct ref (branch/tag) pointing
# to them on the repository.
#
# Problem scenario:
#  ┌──────────────────────────────────────────────────────┐
#  │  PR Branch (closed)                                  │
#  │  ┌─────────────────────────────────────────────┐     │
#  │  │ Commit A (v1.0.0) ← We want to tag this     │     │
#  │  │     │                                       │     │
#  │  │     └──→ Commit B (v1.1.0) ← And this too   │     │
#  │  └─────────────────────────────────────────────┘     │
#  │         └──→ Merge Commit (on main) ✓ Has ref        │
#  │             (Can tag this, no problem)               │
#  └──────────────────────────────────────────────────────┘
#
# API says: "I see commits A and B exist, and they're in
# main's history (parents of the merge commit), but they
# don't have their own refs, so I won't let you tag them."
#
# Solution: Create a temporary branch pointing to each
# commit, then tag it. After tagging, delete the temp branch.
#
#  ┌──────────────────────────────────────────────────────┐
#  │  Before tagging Commit A:                            │
#  │  ┌─────────────────────────────────────────────┐     │
#  │  │ Commit A ← No ref, API rejects tag          │     │
#  │  └─────────────────────────────────────────────┘     │
#  └──────────────────────────────────────────────────────┘
#
#  Step 1: Create temp branch → Commit A
#  ┌──────────────────────────────────────────────────────┐
#  │  Commit A                                            │
#  │  ↑                                                   │
#  │  └─ temp-tag-1234567890-abcd1234 (temporary ref)     │
#  └──────────────────────────────────────────────────────┘
#
#  Step 2: API now allows tagging Commit A
#  ┌──────────────────────────────────────────────────────┐
#  │  Commit A                                            │
#  │  ↑                                                   │
#  │  ├─ temp-tag-1234567890-abcd1234                     │
#  │  └─ v1.0.0 (actual tag) ✓ Success                    │
#  └──────────────────────────────────────────────────────┘
#
#  Step 3: Delete temp branch (cleanup)
#  ┌──────────────────────────────────────────────────────┐
#  │  Commit A                                            │
#  │  ↑                                                   │
#  │  └─ v1.0.0 (final state)                             │
#  └──────────────────────────────────────────────────────┘
#
# This workaround ensures we can tag any commit in the
# repository, regardless of whether it has a direct branch
# reference on the remote.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "The tag name to create (e.g. path/to/package/v1.2.3)"
        required: true
        type: string
      sha:
        description: "The commit SHA to tag"
        required: true
        type: string

jobs:
  tag-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -e

          TAG="${{ inputs.tag }}"
          SHA="${{ inputs.sha }}"

          echo "Creating tag: $TAG for commit: $SHA"

          # Check if tag already exists
          if gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" &>/dev/null; then
            echo "ℹ️  Tag already exists: $TAG"
            exit 0
          fi

          # Create a temporary branch pointing to the commit
          # This gives the commit a ref so GitHub's API will allow tagging it
          # Use the tag name (with slashes replaced) so the relationship is clear
          # Prefix with TEMP_ so we know it's safe to delete
          TEMP_BRANCH="TEMP_${TAG//\//-}"
          echo "Creating temporary branch: $TEMP_BRANCH"
          git branch "$TEMP_BRANCH" "$SHA"
          git push origin "$TEMP_BRANCH"

          BACKOFF=1
          ATTEMPT=1

          while (( ATTEMPT <= 7 )); do
            if gh api --method POST "repos/${{ github.repository }}/git/refs" \
              -f "ref=refs/tags/$TAG" \
              -f "sha=$SHA" 2>&1; then
              echo "✅ Created tag: $TAG"
              # Clean up temporary branch
              git push origin --delete "$TEMP_BRANCH" || true
              exit 0
            fi

            # Check if it was created between our check and our attempt
            if gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" &>/dev/null; then
              echo "ℹ️  Tag already exists: $TAG"
              # Clean up temporary branch
              git push origin --delete "$TEMP_BRANCH" || true
              exit 0
            fi

            if (( ATTEMPT == 5 )); then
              echo "❌ Failed to create tag: $TAG (after 5 attempts)" >&2
              # Clean up temporary branch
              git push origin --delete "$TEMP_BRANCH" || true
              exit 1
            fi

            echo "❌ Failed to create tag: $TAG (attempt $ATTEMPT/5)" >&2
            echo "⏳ Retrying in ${BACKOFF}s..."
            sleep "$BACKOFF"

            BACKOFF=$((BACKOFF * 2))
            (( ATTEMPT++ ))

            if (( BACKOFF > 60 )); then
              echo "❌ Backoff seconds ($BACKOFF) would exceed maximum of 60" >&2
              # Clean up temporary branch
              git push origin --delete "$TEMP_BRANCH" || true
              exit 1
            fi
          done
