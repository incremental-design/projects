# Validate each commit in a push to ensure every commit maintains a working state
# across all supported platforms

name: Validate Commits on Push

# CI Pipeline Flow:
#
# This workflow validates each commit from base to head individually
# to ensure each commit maintains a working state:
#
# ┌──────────────────────────────────────────────────────────┐
# │ Per-Commit Sequential Validation                         │
# │                                                          │
# │  For each commit C1...CN:                                │
# │  ┌─────────────────┐   ┌─────────────────┐   ┌────────┐  │
# │  │   git checkout  │   │  Run validation │   │  Next  │  │
# │  │    commit Ci    ├──►│     step(s)     ├──►│ commit │  │
# │  └─────────────────┘   └─────────────────┘   └────────┘  │
# └──────────────────────────────────────────────────────────┘
#
# Workflow Steps:
#
# ┌──────────────────┐
# │                  │
# │  Lint Commits    │ <-- Run on Linux ARM
# │    Messages      │     Validates commit message format
# │                  │     for each commit in sequence
# └────────┬─────────┘
#          │
#          ▼
# ┌──────────────────┐
# │                  │
# │  Lint Semantic   │ <-- Run on Linux ARM
# │    Versions      │     Validates semver in each project
# │                  │     for each commit in sequence
# └────────┬─────────┘
#          │
#          ▼
# ┌──────────────────┐
# │                  │
# │  Lint Projects   │ <-- Run on Linux ARM
# │                  │     Each commit is checked out and
# │                  │     all projects are linted
# └────────┬─────────┘
#          │
#          ▼
#          │     Build & Test (parallel across platforms)
#          │    ┌───────────────────────────────────────────────┐
#          │    │  Each commit is checked out and validated     │
#          │    │  on every platform in parallel                │
#          │    │                                               │
#          │    │  ┌─────────────────┐                          │
#          │    │  │ macOS ARM64     │                          │
#          │    │  │ ┌─────────────┐ │                          │
#          │    │  │ │    Build    │ │                          │
#          └────┼─►│ │    Test     │ │                          │
#               │  │ └─────────────┘ │                          │
#               │  └─────────────────┘                          │
#               │                                               │
#               │  ┌─────────────────┐   ┌─────────────────┐    │
#               │  │ Linux ARM64     │   │ Linux x86_64    │    │
#               │  │ ┌─────────────┐ │   │ ┌─────────────┐ │    │
#               │  │ │    Build    │ │   │ │    Build    │ │    │
#               │  │ │    Test     │ │   │ │    Test     │ │    │
#               │  │ └─────────────┘ │   │ └─────────────┘ │    │
#               │  └─────────────────┘   └─────────────────┘    │
#               │                                               │
#               └──────────────────────┬────────────────────────┘
#                                      │
#                                      │
#                                      ▼
#                             ┌──────────────────┐
#                             │                  │
#                             │  Summary Report  │
#                             │                  │
#                             └──────────────────┘

on:
  push:
    branches:
      - "**" # Run on all branches
  pull_request:
    branches: ["main"]

jobs:
  # First job: Gather the commits that need validation
  lint-commit-messages:
    name: Lint Commit Messages
    runs-on: ubuntu-22.04-arm # GitHub-hosted ARM64 runner
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build lintCommit from Nix
        run: |
          # Build the lintCommit tool from the Nix expression
          nix-build .config/lint-commit.nix

      - name: Lint Commit Messages
        id: lint-commit-messages
        run: |
          # Exit at first failure
          set -e

          # Get all commits from GitHub event
          COMMITS=$(echo '${{ toJson(github.event.commits) }}' | jq -r '(. // []) | .[].id')

          # Handle empty pushes
          if [[ -z "$COMMITS" ]]; then
            echo "No commits to validate"
            exit 0
          fi

          # Format for logging
          COMMITS_JSON=$(echo "$COMMITS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "Found commits to validate: $COMMITS_JSON"

          # Loop through each commit
          for commit in $COMMITS; do
            echo "============================================================"
            echo "🔍 Validating commit: $commit"
            echo "📝 Message: $(git log -1 --pretty=%B $commit)"
            echo "============================================================"

            # Get commit message and validate it using lintCommit
            git log -1 --pretty=%B "$commit" > commit_message.txt
            ./result/bin/lintCommit commit_message.txt

            echo "✅ Commit $commit passed validation" >&2
          done

  # Semantic version validation job
  lint-semantic-versions:
    name: Lint Semantic Versions
    needs: lint-commit-messages
    runs-on: ubuntu-22.04-arm # GitHub-hosted ARM64 runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Lint semantic versions for each commit
        run: |
          # Exit at first failure
          set -e

          # project lint semver command already iterates from HEAD all the way to BASE,
          # accumulating packages that may have been deleted along the way. No need to
          # iterate backward through commits here.

          if ! nix develop --command project-lint-semver --all; then
              echo "❌ Commit $commit failed project-lint-semver" >&2
              exit 1
            else
              echo "✅ Commit $commit passed project-lint-semver" >&2
          fi

  # Lint job - only needs to run on one platform since it's not platform-specific
  lint-projects:
    name: Lint Projects
    needs: lint-semantic-versions
    runs-on: ubuntu-22.04-arm # GitHub-hosted ARM64 runner
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Lint each commit
        run: |
          # Exit at first failure
          set -e

          # Get all commits from GitHub event
          COMMITS=$(echo '${{ toJson(github.event.commits) }}' | jq -r '(. // []) | .[].id')

          # Handle empty pushes
          if [[ -z "$COMMITS" ]]; then
            echo "No commits to validate"
            exit 0
          fi

          # Loop through each commit
          for commit in $COMMITS; do
            echo "============================================================"
            echo "🔍 Linting commit: $commit"
            echo "📝 Message: $(git log -1 --pretty=%B $commit)"
            echo "📅 Date: $(git log -1 --pretty=%ad --date=iso $commit)"
            echo "🧑‍💻 Author: $(git log -1 --pretty=%an $commit)"
            echo "============================================================"

            # Check out this specific commit
            git checkout -q $commit

            if ! nix develop --command project-lint --changed; then
              echo "❌ Commit $commit failed project-lint" >&2
              exit 1
            else
              echo "✅ Commit $commit passed project-lint" >&2
            fi
          done

  # Build and test job - needs to run on all platforms
  build-test:
    name: Build & test on ${{ matrix.os-name }} (${{ matrix.platform }})
    needs: lint-projects

    strategy:
      matrix:
        include:
          - os: macos-14
            os-name: macOS
            platform: aarch64-darwin
          - os: ubuntu-22.04
            os-name: Linux
            platform: x86_64-linux
          - os: ubuntu-22.04-arm
            os-name: Linux
            platform: aarch64-linux

      # Don't cancel other platform runs if one fails
      fail-fast: false

    runs-on: ${{ matrix.os }}
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Build and test each commit
        run: |
          # Exit at first failure
          set -e

          # Get all commits from GitHub event
          COMMITS=$(echo '${{ toJson(github.event.commits) }}' | jq -r '(. // []) | .[].id')

          # Handle empty pushes
          if [[ -z "$COMMITS" ]]; then
            echo "No commits to validate"
            exit 0
          fi

          # Loop through each commit
          for commit in $COMMITS; do
            echo "============================================================"
            echo "🔍 Validating commit: $commit on ${{ matrix.os-name }} (${{ matrix.platform }})"
            echo "📝 Message: $(git log -1 --pretty=%B $commit)"
            echo "📅 Date: $(git log -1 --pretty=%ad --date=iso $commit)"
            echo "🧑‍💻 Author: $(git log -1 --pretty=%an $commit)"
            echo "============================================================"

            # Check out this specific commit
            git checkout -q $commit

            echo "🏗️ Running build and test on ${{ matrix.platform }}..."

            if ! (nix develop --command project-build --changed); then
              echo "❌ Commit $commit failed project-build on ${{ matrix.os-name }} (${{ matrix.platform }}" >&2
              exit 1
            else
              echo "✅ Commit $commit passed project-build on ${{ matrix.os-name }} (${{ matrix.platform }}" >&2
            fi

            if ! (nix develop --command project-test --changed); then
              echo "❌ Commit $commit failed project-test on ${{ matrix.os-name }} (${{ matrix.platform }}" >&2
              exit 1
            else
              echo "✅ Commit $commit passed project-test on ${{ matrix.os-name }} (${{ matrix.platform }}" >&2
            fi
          done
